name: Publish Local Reports

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "reports/**"
      - "docs/**"
      - "btc_morning_report.html"
      - "btc_morning_report_en.html"
      - "index.html"
      - ".nojekyll"
      - ".github/workflows/laevitas-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
